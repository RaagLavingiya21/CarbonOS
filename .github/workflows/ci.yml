name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check --ignore E501 evals tests calc parsing factors api llm copilot gap_analyzer rag db observability

      - name: Unit tests
        run: pytest tests -v

      - name: Golden-file evals
        run: pytest evals/test_golden_files.py -v

      - name: LLM judge evals (skip without key)
        run: python -m evals.llm_judge --skip-without-key
